pipeline:
  data_dir: data
  pdf_dir: data/printed
  gt_dir: data/ground_truth
  out_dir: outputs/test1_ocr_only
  task: test1
  ocr_backend: pypdf_text
  use_llm: false
  model_name: printed_crnn_only
  max_pages: 2
  dpi: 300
  main_text_strategy: center_crop
  main_text_margin: 0.08
  llm_every_stage: false
  use_ocr_prior: false
  save_page_outputs: false

llm:
  api_key_env: OPENAI_API_KEY
  model: gpt-4.1-mini
  temperature: 0.0
